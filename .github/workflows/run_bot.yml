name: Korea Close Betting Bot

on:
  workflow_dispatch:           # cron-job.org → POST /dispatches 로 트리거
    inputs:
      force_run:
        description: '비거래일에도 강제 실행 (true/false)'
        required: false
        default: 'false'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    # reports/ 자동 커밋에 쓰기 권한 필요
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 자동 커밋을 위해 fetch-depth 0 필요
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2:    ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          TELEGRAM_CHAT_ID_3:    ${{ secrets.TELEGRAM_CHAT_ID_3 }}
          PAGES_BASE_URL:        ${{ secrets.PAGES_BASE_URL }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY:          ${{ secrets.DART_API_KEY }}
          FORCE_RUN:             ${{ github.event.inputs.force_run }}
          TZ: Asia/Seoul
        run: python -m scripts.pipeline

      - name: Run weekly backtest (금요일 자동 실행)
        env:
          TZ: Asia/Seoul
        run: |
          DAY=$(python -c "from datetime import date; print(date.today().weekday())")
          if [ "$DAY" = "4" ]; then
            echo "금요일 → 주간 백테스트 실행"
            python -m scripts.weekly_backtest
          else
            echo "금요일 아님 (weekday=$DAY) → skip"
          fi

      # ── 방식 A (권장): reports/ 를 main 브랜치에 자동 커밋 ──
      # GitHub Pages 소스를 "main 브랜치 / (root)" 또는 "main 브랜치 / docs" 로
      # 설정하면 커밋 즉시 Pages에 반영됩니다.
      - name: Commit dashboard reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ index.html
          git add data/signals/ data/weekly_backtest/ reports/weekly_backtest/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update dashboard reports [skip ci]"
          git pull --rebase --autostash origin main
          git push

      # ── 방식 B (대안): gh-pages 브랜치에만 배포하려면 아래 주석 해제 ──
      # (방식 A 대신 사용, 방식 A steps는 제거할 것)
      # - name: Deploy to gh-pages
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./reports
      #     destination_dir: reports
      #     keep_files: true

      - name: Push public report to stock-report-site
        if: false  # 프론트엔드 완성 후 재활성화
        env:
          STOCK_SITE_TOKEN: ${{ secrets.STOCK_SITE_TOKEN }}
        run: |
          if [ -z "$STOCK_SITE_TOKEN" ]; then
            echo "STOCK_SITE_TOKEN not set, skipping"
            exit 0
          fi
          REPO_URL="https://x-access-token:${STOCK_SITE_TOKEN}@github.com/sunflowerofmine-afk/stock-report-site.git"
          if git clone --depth=1 "$REPO_URL" /tmp/stock-site 2>/dev/null; then
            echo "Cloned existing repo"
          else
            mkdir -p /tmp/stock-site && cd /tmp/stock-site
            git init && git remote add origin "$REPO_URL"
            cd -
          fi
          mkdir -p /tmp/stock-site/reports
          cp public_site/reports/*.html /tmp/stock-site/reports/ 2>/dev/null || true
          python -c "
          import sys; sys.path.insert(0,'.')
          from scripts.public_report import generate_site_index
          generate_site_index('/tmp/stock-site')
          "
          cd /tmp/stock-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "chore: update report $(date +%Y-%m-%d)"
            git push origin main 2>/dev/null || git push --set-upstream origin main
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-output-${{ github.run_id }}
          path: |
            data/
            logs/
            reports/
          retention-days: 30
