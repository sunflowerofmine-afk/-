name: Korea Close Betting Bot

on:
  workflow_dispatch:           # cron-job.org → POST /dispatches 로 트리거
    inputs:
      force_run:
        description: '비거래일에도 강제 실행 (true/false)'
        required: false
        default: 'false'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # reports/ 자동 커밋에 쓰기 권한 필요
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 자동 커밋을 위해 fetch-depth 0 필요
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync previous signals (review.py용)
        # 직전 실행 artifact의 signals 파일을 복원 → review.py가 어제 신호 복기 가능
        # GITHUB_TOKEN은 같은 레포 artifact 읽기 권한 보유
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_RUN=$(gh run list --workflow run_bot.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$PREV_RUN" ]; then
            echo "이전 run: $PREV_RUN"
            mkdir -p data/signals
            gh run download "$PREV_RUN" -n "bot-output-${PREV_RUN}" -D /tmp/prev_art 2>/dev/null && \
              cp /tmp/prev_art/data/signals/* data/signals/ 2>/dev/null || true
            echo "복원 완료: $(ls data/signals/ | wc -l)개 파일"
          else
            echo "이전 run 없음 → skip"
          fi

      - name: Run pipeline
        env:
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2:    ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          TELEGRAM_CHAT_ID_3:    ${{ secrets.TELEGRAM_CHAT_ID_3 }}
          PAGES_BASE_URL:        ${{ secrets.PAGES_BASE_URL }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY:          ${{ secrets.DART_API_KEY }}
          FORCE_RUN:             ${{ github.event.inputs.force_run }}
          TZ: Asia/Seoul
        run: python -m scripts.pipeline

      - name: Run weekly backtest (금요일 자동 실행)
        continue-on-error: true   # 신호 파일 없어도 대시보드 커밋 차단 방지
        env:
          TZ: Asia/Seoul
        run: |
          DAY=$(python -c "from datetime import date; print(date.today().weekday())")
          if [ "$DAY" = "4" ]; then
            echo "금요일 → 주간 백테스트 실행"
            python -m scripts.weekly_backtest
          else
            echo "금요일 아님 (weekday=$DAY) → skip"
          fi

      # ── 방식 A (권장): reports/ 를 main 브랜치에 자동 커밋 ──
      # GitHub Pages 소스를 "main 브랜치 / (root)" 또는 "main 브랜치 / docs" 로
      # 설정하면 커밋 즉시 Pages에 반영됩니다.
      - name: Commit dashboard reports
        if: always()   # weekly_backtest 실패와 무관하게 항상 실행
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ index.html
          git add data/weekly_backtest/ reports/weekly_backtest/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update dashboard reports [skip ci]"
          git pull --rebase --autostash origin main
          git push

      # ── 방식 B (대안): gh-pages 브랜치에만 배포하려면 아래 주석 해제 ──
      # (방식 A 대신 사용, 방식 A steps는 제거할 것)
      # - name: Deploy to gh-pages
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: ./reports
      #     destination_dir: reports
      #     keep_files: true

      - name: Push public report to stock-report-site
        if: false  # 프론트엔드 완성 후 재활성화
        env:
          STOCK_SITE_TOKEN: ${{ secrets.STOCK_SITE_TOKEN }}
        run: |
          if [ -z "$STOCK_SITE_TOKEN" ]; then
            echo "STOCK_SITE_TOKEN not set, skipping"
            exit 0
          fi
          REPO_URL="https://x-access-token:${STOCK_SITE_TOKEN}@github.com/sunflowerofmine-afk/stock-report-site.git"
          if git clone --depth=1 "$REPO_URL" /tmp/stock-site 2>/dev/null; then
            echo "Cloned existing repo"
          else
            mkdir -p /tmp/stock-site && cd /tmp/stock-site
            git init && git remote add origin "$REPO_URL"
            cd -
          fi
          mkdir -p /tmp/stock-site/reports
          cp public_site/reports/*.html /tmp/stock-site/reports/ 2>/dev/null || true
          python -c "
          import sys; sys.path.insert(0,'.')
          from scripts.public_report import generate_site_index
          generate_site_index('/tmp/stock-site')
          "
          cd /tmp/stock-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "chore: update report $(date +%Y-%m-%d)"
            git push origin main 2>/dev/null || git push --set-upstream origin main
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-output-${{ github.run_id }}
          path: |
            data/
            logs/
            reports/
          retention-days: 30

      # 신호/복기 데이터 영구 백업 (비공개 레포 jongbe-data-backup)
      # DATA_BACKUP_SSH_KEY 시크릿(deploy key 개인키) 미설정 시 자동 skip
      - name: Backup signals to private repo
        if: always()
        env:
          BACKUP_KEY: ${{ secrets.DATA_BACKUP_SSH_KEY }}
        run: |
          if [ -z "$BACKUP_KEY" ]; then
            echo "DATA_BACKUP_SSH_KEY 미설정 — 백업 skip"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$BACKUP_KEY" > ~/.ssh/backup_key
          chmod 600 ~/.ssh/backup_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:sunflowerofmine-afk/jongbe-data-backup.git /tmp/backup
          mkdir -p /tmp/backup/data
          cp -r data/signals /tmp/backup/data/ 2>/dev/null || true
          cp -r data/pullback_observation /tmp/backup/data/ 2>/dev/null || true
          cd /tmp/backup
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "변경 없음" || \
            git commit -m "backup: $(TZ=Asia/Seoul date +%Y-%m-%d_%H%M)"
          git push || echo "백업 push 실패 (파이프라인은 정상)"
