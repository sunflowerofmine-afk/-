name: NXT 거래대금 저장

# NXT 애프터마켓 종료(20:00 KST) 이후 실행.
# 매 거래일 20:10 KST 자동 실행 + GitHub UI "Run workflow" 수동 실행 병행.
on:
  workflow_dispatch:
  schedule:
    - cron: "10 11 * * 1-5"   # 20:10 KST (= 11:10 UTC), 월-금

jobs:
  save-nxt:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save NXT trading value
        env:
          TZ: Asia/Seoul
        run: python -m scripts.save_nxt

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nxt-${{ github.run_id }}
          path: data/nxt/
          retention-days: 90

      # 영구 백업 (비공개 레포 jongbe-data-backup). DATA_BACKUP_SSH_KEY 미설정 시 skip
      - name: Backup NXT data to private repo
        if: always()
        env:
          BACKUP_KEY: ${{ secrets.DATA_BACKUP_SSH_KEY }}
        run: |
          if [ -z "$BACKUP_KEY" ]; then
            echo "DATA_BACKUP_SSH_KEY 미설정 — 백업 skip"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$BACKUP_KEY" > ~/.ssh/backup_key
          chmod 600 ~/.ssh/backup_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/backup_key -o StrictHostKeyChecking=accept-new"
          git clone --depth 1 git@github.com:sunflowerofmine-afk/jongbe-data-backup.git /tmp/backup
          mkdir -p /tmp/backup/data/nxt
          cp -r data/nxt/* /tmp/backup/data/nxt/ 2>/dev/null || true
          cd /tmp/backup
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "변경 없음" || \
            git commit -m "nxt: $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push || echo "백업 push 실패"
