name: Extra Signals Data

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 21:00 KST (UTC+9 = 12:00 UTC), 평일만
  workflow_dispatch:

jobs:
  fetch-extra:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync latest signals (17:50 신호 복원)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_RUN=$(gh run list --workflow run_bot.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$PREV_RUN" ]; then
            echo "이전 run: $PREV_RUN"
            mkdir -p data/signals
            gh run download "$PREV_RUN" -n "bot-output-${PREV_RUN}" -D /tmp/prev_art 2>/dev/null && \
              cp /tmp/prev_art/data/signals/* data/signals/ 2>/dev/null || true
            echo "복원: $(ls data/signals/ 2>/dev/null | wc -l)개 파일"
          else
            echo "이전 run 없음 → skip"
          fi

      - name: Fetch extra signals data
        env:
          TZ: Asia/Seoul
        run: python -m scripts.fetch_extra_signals_data

      - name: Commit extra signals data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_extra/
          if git diff --cached --quiet; then
            echo "변경 없음 → skip"
          else
            git commit -m "data: signals_extra $(date +%Y-%m-%d)"
            git push
          fi
