name: Weekly Backtest

on:
  workflow_dispatch:   # 수동 실행 전용 (자동: run_bot.yml 금요일 분기에서 실행)

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly backtest
        env:
          TZ: Asia/Seoul
        run: python -m scripts.weekly_backtest

      - name: Commit backtest report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/weekly_backtest/ data/weekly_backtest/
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: weekly backtest report [skip ci]"
          git pull --rebase --autostash origin main
          git push
