name: Morning Briefing

on:
  workflow_dispatch:           # cron-job.org 08:50 KST 트리거 (schedule 제거 — 중복 발송 방지)

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync previous signals (어제 신호 복원)
        # 직전 파이프라인 artifact에서 signals 파일 복원 → morning_briefing.py가 어제 신호 참조 가능
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_RUN=$(gh run list --workflow run_bot.yml --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$PREV_RUN" ]; then
            echo "이전 run: $PREV_RUN"
            mkdir -p data/signals
            gh run download "$PREV_RUN" -n "bot-output-${PREV_RUN}" -D /tmp/prev_art 2>/dev/null && \
              cp /tmp/prev_art/data/signals/* data/signals/ 2>/dev/null || true
            echo "복원: $(ls data/signals/ 2>/dev/null | wc -l)개 파일"
          else
            echo "이전 run 없음 → skip"
          fi

      - name: Run morning briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_2: ${{ secrets.TELEGRAM_CHAT_ID_2 }}
          TELEGRAM_CHAT_ID_3: ${{ secrets.TELEGRAM_CHAT_ID_3 }}
          TZ: Asia/Seoul
        run: python -m scripts.morning_briefing
