<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종가베팅 대시보드</title>
<style>

:root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --green:     #3fb950;
    --green-bg:  #0f2d13;
    --yellow:    #d29922;
    --yellow-bg: #2d2200;
    --red:       #f85149;
    --red-bg:    #2d0f0f;
    --blue:      #58a6ff;
    --purple:    #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    padding: 12px;
}
.wrap { max-width: 1100px; margin: 0 auto; }

/* ── 헤더 ── */
.page-header {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 16px;
}
.page-header h1 { font-size: 18px; color: var(--blue); margin-bottom: 6px; }
.page-header .meta { color: var(--muted); font-size: 13px; }
.page-header .meta span { margin-right: 16px; }

/* ── 섹션 타이틀 ── */
.section-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    border-left: 3px solid var(--blue);
    padding-left: 10px;
    margin: 20px 0 10px;
}

/* ── 요약 카드 그리드 ── */
.summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
}
.summary-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
}
.summary-card .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.summary-card .value { font-size: 22px; font-weight: 700; color: var(--blue); }
.summary-card .sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── 핵심 후보 카드 ── */
.candidate-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
    margin-bottom: 8px;
}
.candidate-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}
.candidate-card.has-pattern { border-color: var(--green); }
.candidate-card.in-inter    { border-color: var(--yellow); }
.card-head {
    background: var(--bg3);
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
}
.card-head .name   { font-weight: 700; font-size: 15px; }
.card-head .code   { color: var(--muted); font-size: 12px; }
.card-head .market { font-size: 11px; color: var(--muted);
                     background: var(--bg); border-radius: 4px; padding: 2px 6px; }
.card-head .score-badge {
    background: var(--blue);
    color: #000;
    font-weight: 700;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 13px;
    white-space: nowrap;
}
.card-body { padding: 12px 14px; }
.card-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid var(--bg3);
}
.card-row:last-child { border-bottom: none; }
.card-row .lbl { color: var(--muted); font-size: 12px; min-width: 90px; }
.card-row .val { font-size: 13px; text-align: right; }
.val.pos  { color: var(--green); }
.val.neg  { color: var(--red); }
.val.warn { color: var(--yellow); }
.pattern-tag {
    display: inline-block;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 8px;
}
.pattern-none {
    display: inline-block;
    background: var(--bg3);
    color: var(--muted);
    border-radius: 4px;
    padding: 1px 8px;
    font-size: 12px;
    margin-bottom: 8px;
}
.news-item {
    background: var(--bg3);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    word-break: break-all;
}

/* ── 배지 ── */
.badge { border-radius: 4px; padding: 1px 7px; font-size: 12px; font-weight: 600; }
.badge.ok { background: var(--green-bg);  color: var(--green); }
.badge.ng { background: var(--red-bg);    color: var(--red); }
.badge.na { background: var(--bg3);       color: var(--muted); }
.badge.inter { background: var(--yellow-bg); color: var(--yellow); }

/* ── 테이블 ── */
.tbl-wrap { overflow-x: auto; margin-bottom: 8px; }
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: var(--bg2);
    border-radius: 8px;
    overflow: hidden;
}
thead th {
    background: var(--bg3);
    color: var(--muted);
    font-weight: 600;
    text-align: left;
    padding: 8px 12px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
}
tbody td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--bg3);
    vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--bg3); }
.td-name { font-weight: 600; }
.td-code { color: var(--muted); font-size: 11px; }
.td-pos  { color: var(--green); }
.td-neg  { color: var(--red); }
.td-warn { color: var(--yellow); }

/* ── 탈락 영역 ── */
.rejected-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.rejected-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
}
.rejected-item .r-name { font-weight: 600; margin-bottom: 2px; }
.rejected-item .r-reason { color: var(--red); font-size: 11px; }

/* ── 시장 요약 ── */
.market-summary {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
}
.ms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
}
.ms-item { text-align: center; }
.ms-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.ms-value { font-size: 20px; font-weight: 700; color: var(--text); }
.judgment-ok {
    display: inline-block;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 4px 16px;
    font-size: 15px;
    font-weight: 700;
}
.judgment-ng {
    display: inline-block;
    background: var(--yellow-bg);
    color: var(--yellow);
    border: 1px solid var(--yellow);
    border-radius: 6px;
    padding: 4px 16px;
    font-size: 15px;
    font-weight: 700;
}

/* ── 관찰 후보 ── */
.watch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
    margin-bottom: 8px;
}
.watch-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
}
.watch-card .name { font-weight: 600; font-size: 14px; }
.watch-card .code { color: var(--muted); font-size: 11px; margin-left: 6px; }
.watch-body { margin-top: 6px; font-size: 13px; color: var(--muted); }
.watch-note { font-size: 11px; color: var(--yellow); font-weight: 400; margin-left: 8px; }

/* ── 탈락 요약 ── */
.rejected-summary {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
}
.rejected-summary span { margin-right: 16px; }

/* ── 없음 메시지 ── */
.empty-msg {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 8px;
}

/* ── 반응형 ── */
@media (max-width: 600px) {
    body { padding: 8px; font-size: 13px; }
    .candidate-grid { grid-template-columns: 1fr; }
    .summary-grid   { grid-template-columns: repeat(3, 1fr); }
    thead th, tbody td { padding: 6px 8px; }
}

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
.idx-date { font-weight: 600; white-space: nowrap; padding: 10px 16px; }
.idx-links { padding: 10px 16px; }
</style>
</head>
